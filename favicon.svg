<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>
  <!-- พื้นหลังวงกลมสีเข้มเด่นชัด -->
  <circle cx="50" cy="50" r="48" fill="#0F172A" />
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#gold)" stroke-width="2" stroke-dasharray="4 2" />
  
  <!-- รูปหัวใจเชิงการแพทย์ -->
  <path d="M50 24 C40 10 18 16 18 36 C18 56 50 78 50 78 C50 78 82 56 82 36 C82 16 60 10 50 24 Z" 
        fill="url(#emerald)" 
        stroke="url(#gold)" 
        stroke-width="2" />
        
  <!-- กากบาทสาธารณสุขเด่นสีขาว -->
  <path d="M42 36 H58 M50 28 V44" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" />
  
  <!-- เส้น EKG ด้านล่างผสานหัวใจ -->
  <path d="M22 50 H33 L38 40 L43 60 L48 46 L51 54 L54 50 H78" 
        stroke="#FFFFFF" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
</svg>
